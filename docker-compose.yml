version: "3.9"

services:
  postgres:
    image: postgres:17

    container_name: relay-postgres

    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay123
      POSTGRES_DB: relay

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  redis:
    image: redis:8
    container_name: relay-redis

    ports: 
      - "6379:6379"

volumes:
  postgres_data: